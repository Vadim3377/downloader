<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Download Report Viewer</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 1100px; }
        table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
        th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
        th { background: #f5f5f5; }
        code { background: #f5f5f5; padding: 0.1rem 0.25rem; border-radius: 0.25rem; }
    </style>
</head>
<body>
<h1>Download Report Viewer</h1>
<p>This page loads <code>../download-report.json</code> when served by the local Apache demo.</p>
<div id="summary">Loading...</div>
<table id="chunks"></table>
<script>
    fetch('../download-report.json')
        .then(response => response.json())
        .then(report => {
            document.getElementById('summary').innerHTML = `
                <p><strong>URL:</strong> <code>${report.url}</code></p>
                <p><strong>Output:</strong> <code>${report.outputPath}</code></p>
                <p><strong>Size:</strong> ${report.fileSizeBytes} bytes</p>
                <p><strong>Chunks:</strong> ${report.chunkCount}</p>
                <p><strong>SHA-256:</strong> <code>${report.sha256}</code></p>
            `;
            const rows = report.chunks.map(chunk => `
                <tr>
                    <td>${chunk.index}</td>
                    <td>${chunk.startInclusive}-${chunk.endInclusive}</td>
                    <td>${chunk.bytesWritten}</td>
                    <td>${chunk.attempts}</td>
                </tr>
            `).join('');
            document.getElementById('chunks').innerHTML = `
                <thead><tr><th>Index</th><th>Range</th><th>Bytes</th><th>Attempts</th></tr></thead>
                <tbody>${rows}</tbody>
            `;
        })
        .catch(error => {
            document.getElementById('summary').textContent = 'Could not load report: ' + error;
        });
</script>
</body>
</html>
